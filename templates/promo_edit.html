<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Promo</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji';
      background: #021a3c;
      color: white;
      font-size:14px;
    }
 label {
   font-size:12px;
   color: rgba(255,255,255,0.85);
 }
.topbar {
    padding: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255, 255, 255, 0.05);
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    height: 64px;
    padding-inline: 16px;
}
.nav {
  display: flex;
  gap: 10px;
  flex-wrap: nowrap;
  align-items: center;
}

.nav a{
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 12px;
    border-radius:8px;
    text-decoration:none;
    color:rgba(255,255,255,.85);
    transition:.25s;
}

.nav a:hover{
    background:rgba(255,255,255,.06);
    color:#fff;
}

/* ACTIVE */
.nav a.active{
    background:#1668dc;
    color:#fff;
    box-shadow:
        inset 0 1px rgba(255,255,255,.08),
        0 0 0 1px rgba(255,255,255,.08);
}

.nav a.active .nav-icon{
    color:#fff;
}
    .nav a{
    display:flex;
    align-items:center;
    gap:8px;
}

.nav-icon{
    width:19.2px;
    height:19.2px;
    min-width:19.2px;
    min-height:19.2px;
    fill:currentColor;
    flex-shrink:0;
    display:block;
    overflow:visible;
    transition:.25s;
}

    .container {
      width: 100%;
      padding:20px;
      box-sizing: border-box;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 18px;
    }

    h3 {
      margin: 0 0 12px;
      color: #38bdf8;
    }

    textarea {
      width: 100%;
      margin-top: 6px;
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.25);
      color: white;
      box-sizing: border-box;
      outline: none;
      transition: all 0.2s;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      white-space: pre-wrap;
    }
    input{
      width: 100%;
      margin-top: 6px;
      margin-bottom: 12px;
      padding: 4px 11px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.25);
      color: white;
      box-sizing: border-box;
      outline: none;
      transition: all 0.2s;
      height:32px;
    }
    .btn {
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      background: linear-gradient(135deg, #38bdf8, #2563eb);
      color: white;
      transition: 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 12px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      text-align: left;
      font-size: 14px;
    }

    th {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.8);
    }

    .actions a {
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      transition: 0.2s;
    }

    .actions a:hover {
      background: rgba(239,68,68,0.2);
      border-color: rgba(239,68,68,0.4);
    }

    .preview {
      margin-top: 12px;
      padding: 10px;
      background: rgba(0,0,0,0.25);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      text-align: center;
    }

    .preview img {
      max-width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
@media (max-width: 768px) {
  .topbar {
    height: 64px;
    padding-inline: 10px;
    gap: 8px;
  }

  .topbar h2 {
    font-size: 17px;
    line-height: 1;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .nav {
    margin-left: auto;
    display: flex;
    flex-wrap: nowrap;
    gap: 7px;
    overflow: visible;
    flex-shrink: 0;
  }

  .nav a {
    width: 36px;
    height: 36px;
    min-width: 36px;
    padding: 0;
    justify-content: center;
    border-radius: 8px;
  }

  .nav a .nav-text {
    display: none;
  }

  .nav-icon {
    width: 19.2px;
    height: 19.2px;
  }
}
.label-required::before {
    content: "*";
    display: inline-block;
    margin-right: 4px;
    color: #dc4446;
    font-size: 14px;
    font-family: SimSun, sans-serif;
    line-height: 1;
}
    /* Chrome, Edge, Safari */
::-webkit-scrollbar {
  width: 6px; /* nipis */
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: #555;
  border-radius: 10px;
  transition: all 0.25s ease;
}

::-webkit-scrollbar-thumb:hover {
  background: #777;
}

/* Firefox */
html {
  scrollbar-width: thin;
  scrollbar-color: #555 transparent;
}
  </style>
</head>
<body>

  <div class="topbar">
    <h2>✏️ Edit Promo</h2>
<div class="nav">
  <a href="/admin">
    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 4h7v7H4V4zm9 0h7v7h-7V4zM4 13h7v7H4v-7zm9 0h7v7h-7v-7z"/></svg>
    <span class="nav-text">Dashboard</span>
  </a>

  <a href="/admin/promos">
    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 7h-2.2c.1-.3.2-.7.2-1a3 3 0 0 0-5.3-1.9L12 5l-.7-.9A3 3 0 0 0 6 6c0 .3.1.7.2 1H4a2 2 0 0 0-2 2v3h20V9a2 2 0 0 0-2-2zM8 5a1 1 0 0 1 .8.4L10 7H8a1 1 0 0 1 0-2zm8 0a1 1 0 0 1 0 2h-2l1.2-1.6A1 1 0 0 1 16 5zM3 14v6a2 2 0 0 0 2 2h6v-8H3zm10 0v8h6a2 2 0 0 0 2-2v-6h-8z"/></svg>
    <span class="nav-text">Promos</span>
  </a>

  <a href="/admin/banner_buttons">
    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M7 2a1 1 0 0 1 1 1v1h8V3a1 1 0 1 1 2 0v1h1a3 3 0 0 1 3 3v12a3 3 0 0 1-3 3H5a3 3 0 0 1-3-3V7a3 3 0 0 1 3-3h1V3a1 1 0 0 1 1-1zm13 8H4v9a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-9z"/></svg>
    <span class="nav-text">Banner Buttons</span>
  </a>

  <a href="/admin/users">
    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-4.4 0-8 2.2-8 5v1h16v-1c0-2.8-3.6-5-8-5z"/></svg>
    <span class="nav-text">Users</span>
  </a>

  <a href="/admin/logout">
    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 3h9v2H6v14h7v2H4V3zm12.6 5.4L21.2 13l-4.6 4.6-1.4-1.4 2.2-2.2H10v-2h7.4l-2.2-2.2 1.4-1.4z"/></svg>
    <span class="nav-text">Logout</span>
  </a>
</div>
  </div>

  <div class="container">

    <div class="card">
      <h3>📝 Promo Details</h3>

      <form method="POST">
        <label>Title</label>
        <input type="text" name="title" value="{{ promo[1] }}">

        <label>Image URL</label>
        <input type="text" name="image_url" value="{{ promo[2] }}">

        <label>Caption</label>
        <textarea name="caption">{{ promo[3] }}</textarea>

        <button class="btn" type="submit">💾 Save Changes</button>
      </form>

      <div class="preview">
        <p style="opacity:0.7;margin-bottom:10px;">Preview</p>
        <img src="{{ promo[2] }}" alt="Promo Preview">
      </div>
    </div>

    <div class="card">
      <h3>🔘 Promo Buttons</h3>

      <form method="POST" action="/admin/promo/{{ promo[0] }}/button/add">
        <input type="text" name="text" placeholder="Button Text (example: Register)" required>
        <input type="text" name="url" placeholder="Button URL (example: https://...)" required>
        <button class="btn" type="submit">➕ Add Button</button>
      </form>

      <hr style="border:0;border-top:1px solid rgba(255,255,255,0.08);margin:18px 0;">

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Text</th>
            <th>URL</th>
            <th>Sort</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          {% for b in buttons %}
          <tr>
            <td>{{ b[0] }}</td>
            <td>{{ b[1] }}</td>
            <td>{{ b[2] }}</td>
            <td>{{ b[3] }}</td>
            <td class="actions">
              <a href="/admin/promo/button/delete/{{ b[0] }}/{{ promo[0] }}" onclick="return confirm('Delete this button?')">Delete</a>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>

    </div>

  </div>
<script>
const currentPath = window.location.pathname;

document.querySelectorAll(".nav a").forEach(link => {
  const href = link.getAttribute("href");

  link.classList.remove("active");

  if (href === currentPath) {
    link.classList.add("active");
  }
});
</script>
</body>
</html>
