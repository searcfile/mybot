<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Promo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .topbar {
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav {
      display: flex;
      gap: 10px;
    }

    .nav a {
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      transition: 0.2s;
    }

    .nav a:hover {
      background: rgba(56,189,248,0.2);
      border-color: rgba(56,189,248,0.4);
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 18px;
    }

    h3 {
      margin: 0 0 12px;
      color: #38bdf8;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.25);
      color: white;
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
      margin-bottom: 10px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .btn {
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      background: linear-gradient(135deg, #38bdf8, #2563eb);
      color: white;
      transition: 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 12px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      text-align: left;
      font-size: 14px;
    }

    th {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.8);
    }

    .actions a {
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      transition: 0.2s;
    }

    .actions a:hover {
      background: rgba(239,68,68,0.2);
      border-color: rgba(239,68,68,0.4);
    }

    .preview {
      margin-top: 12px;
      padding: 10px;
      background: rgba(0,0,0,0.25);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      text-align: center;
    }

    .preview img {
      max-width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>

  <div class="topbar">
    <h2>✏️ Edit Promo</h2>
    <div class="nav">
      <a href="/admin">Dashboard</a>
      <a href="/admin/promos">Promos</a>
      <a href="/admin/banner_buttons">Banner Buttons</a>
      <a href="/admin/users">Users</a>
      <a href="/admin/logout">Logout</a>
    </div>
  </div>

  <div class="container">

    <div class="card">
      <h3>📝 Promo Details</h3>

      <form method="POST">
        <label>Title</label>
        <input type="text" name="title" value="{{ promo[1] }}">

        <label>Image URL</label>
        <input type="text" name="image_url" value="{{ promo[2] }}">

        <label>Caption</label>
        <textarea name="caption">{{ promo[3] }}</textarea>

        <button class="btn" type="submit">💾 Save Changes</button>
      </form>

      <div class="preview">
        <p style="opacity:0.7;margin-bottom:10px;">Preview</p>
        <img src="{{ promo[2] }}" alt="Promo Preview">
      </div>
    </div>

    <div class="card">
      <h3>🔘 Promo Buttons</h3>

      <form method="POST" action="/admin/promo/{{ promo[0] }}/button/add">
        <input type="text" name="text" placeholder="Button Text (example: Register)" required>
        <input type="text" name="url" placeholder="Button URL (example: https://...)" required>
        <button class="btn" type="submit">➕ Add Button</button>
      </form>

      <hr style="border:0;border-top:1px solid rgba(255,255,255,0.08);margin:18px 0;">

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Text</th>
            <th>URL</th>
            <th>Sort</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          {% for b in buttons %}
          <tr>
            <td>{{ b[0] }}</td>
            <td>{{ b[1] }}</td>
            <td>{{ b[2] }}</td>
            <td>{{ b[3] }}</td>
            <td class="actions">
              <a href="/admin/promo/button/delete/{{ b[0] }}/{{ promo[0] }}" onclick="return confirm('Delete this button?')">Delete</a>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>

    </div>

  </div>

</body>
</html>
