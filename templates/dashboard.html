<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #021a3c;
      color: white;
    }

    .topbar {
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav a {
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
    }

.container {
  width: 100%;
  padding: 20px;
  box-sizing: border-box;
}

.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  align-items: start;
}

.right-grid {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

@media (max-width: 768px) {
  .dashboard-grid {
    grid-template-columns: 1fr;
  }
}

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 16px;
    }

    h3 {
      color: #38bdf8;
      margin-bottom: 10px;
    }

    input, textarea, select {
      width: 100%;
      margin-top: 6px;
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.25);
      color: white;
      box-sizing: border-box;
      outline: none;
      transition: all 0.2s
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      white-space: pre-wrap;
    }

    button {
      padding: 0px 15px;
      border-radius: 6px;
      border: none;
      background: #1668dc;
      color: white;
      font-size:14px ;
      cursor: pointer;
      height:32px;
      transition: all 0.2s
    }

    button:hover {
      background: #3c89e8;
    }
    button:active {
      background: #1554ad;
    }

    .upload-box {
      border: 1px dashed rgba(255,255,255,0.3);
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .success {
      margin-top: 10px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #38bdf8;
      background: rgba(56,189,248,0.1);
    }

    .hint {
      font-size: 12px;
      opacity: 0.7;
      line-height: 1.6;
      margin-top: -6px;
      margin-bottom: 14px;
    }

    hr {
      border: 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin: 20px 0;
    }

  </style>
</head>

<body>

  <div class="topbar">
    <h2>⚙️ Admin Dashboard</h2>

    <div class="nav">
      <a href="/admin">Dashboard</a>
      <a href="/admin/promos">Promos</a>
      <a href="/admin/banner_buttons">Banner Buttons</a>
      <a href="/admin/users">Users</a>
      <a href="/admin/logout">Logout</a>
    </div>
  </div>

<div class="container">

  <div class="dashboard-grid">

    <!-- ================= LEFT: SETTINGS ================= -->
    <div class="card">
      <h3>⚙️ Settings</h3>

      <form method="POST" action="/admin">

        <label>Main Banner URL</label>
        <input type="text" name="main_banner" value="{{ data.main_banner }}">

        <label>Welcome Text</label>
        <textarea name="welcome_text">{{ data.welcome_text }}</textarea>

        <label>About Text</label>
        <textarea name="about_text">{{ data.about_text }}</textarea>

        <label>Register URL</label>
        <input type="text" name="register_url" value="{{ data.register_url }}">

        <label>Telegram Support</label>
        <input type="text" name="telegram_support" value="{{ data.telegram_support }}">

        <label>WhatsApp URL</label>
        <input type="text" name="whatsapp_url" value="{{ data.whatsapp_url }}">

        <label>Manual Today Add</label>
        <input type="number" name="manual_today_add" value="{{ data.manual_today_add }}">

        <label>Manual Month Add</label>
        <input type="number" name="manual_month_add" value="{{ data.manual_month_add }}">

        <button type="submit">Save Settings</button>
      </form>
    </div>

    <!-- ================= RIGHT SIDE ================= -->
    <div class="right-grid">

      <!-- ================= REFERRAL SETTINGS ================= -->
      <div class="card">
        <h3>🎁 Referral Settings</h3>

        <form method="POST" action="/admin">

          <label>Referral System</label>
          <select name="referral_enabled">
            <option value="1" {% if data.referral_enabled == "1" %}selected{% endif %}>Enabled</option>
            <option value="0" {% if data.referral_enabled == "0" %}selected{% endif %}>Disabled</option>
          </select>

          <label>Referral Image URL</label>
          <input type="text" name="referral_image" value="{{ data.referral_image }}">

          <label>Referral Message Template</label>
          <textarea name="referral_text" rows="8">{{ data.referral_text }}</textarea>

          <div class="hint">
            Variables:<br>
            {ref_code} = referral code<br>
            {ref_link} = referral link<br>
            {ref_count} = invited users
          </div>

          <button type="submit">Save Referral</button>
        </form>
      </div>

      <!-- ================= UPLOAD BANNER ================= -->
      <div class="card">
        <h3>📤 Upload Banner (Cloudinary)</h3>

        <form method="POST" action="/admin/upload_banner" enctype="multipart/form-data">

          <div class="upload-box">
            <input type="file" name="image" required>
          </div>

          <button type="submit">Upload Image</button>

        </form>

        {% if uploaded_url %}
        <div class="success">

          <h3>✅ Upload Success</h3>

          <input type="text" id="urlBox" value="{{ uploaded_url }}" readonly>

          <button onclick="copyUrl()" style="margin-top:10px;background:#22c55e;color:white;">
            📋 Copy Link
          </button>

        </div>

        <script>
          function copyUrl() {
            const input = document.getElementById("urlBox");
            input.select();
            document.execCommand("copy");
            alert("Copied!");
          }
        </script>
        {% endif %}

      </div>

    </div>

  </div>

</div>

</body>
</html>
