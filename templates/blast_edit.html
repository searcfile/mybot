<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Blast Vault</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji';
      background: #021a3c;
      color: white;
      font-size:14px;
    }
:where(button, a, .btn, .select-selected,[tabindex]):focus-visible{
  outline: 2px solid #38bdf8 !important;
  outline-offset: 1px;
  transition: outline-offset 0s, outline 0s;
}
   .select-selected:hover {
      border-color: #16b7ff !important;
     transition: all 0.3s;
    }
   /* #159edb */
   .select-selected:focus {
      border-color: #38bdf8 !important;
      box-shadow: 0 0 0 2px rgba(56,189,248,0.25) !important;
     transition: all 0.3s;
    }
    input:hover {
      border-color: #16b7ff !important;
     transition: all 0.3s;
    }
   /* #159edb */
   input:focus {
      border-color: #38bdf8 !important;
      box-shadow: 0 0 0 2px rgba(56,189,248,0.25) !important;
     transition: all 0.3s;
    }
      textarea:hover {
      border-color: #16b7ff !important;
     transition: all 0.3s;
    }
   /* #159edb */
    textarea:focus {
      border-color: #38bdf8 !important;
      box-shadow: 0 0 0 2px rgba(56,189,248,0.25) !important;
     transition: all 0.3s;
    }
 label {
   font-size:12px;
   color: rgba(255,255,255,0.85);
   display:block;
   margin-bottom:4px;
 }
    .topbar {
      padding:0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      height:64px;
      padding-inline: 16px;
    }

.nav {
  display: flex;
  gap: 10px;
  flex-wrap: nowrap;
  align-items: center;
}

.nav a{
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 12px;
    border-radius:8px;
    text-decoration:none;
    color:rgba(255,255,255,.85);
    transition:.25s;
    white-space: nowrap;
}

.nav a:hover{
    background:rgba(255,255,255,.06);
    color:#fff;
}

/* ACTIVE */
.nav a.active{
    background:#1668dc;
    color:#fff;
    box-shadow:
        inset 0 1px rgba(255,255,255,.08),
        0 0 0 1px rgba(255,255,255,.08);
}

.nav a.active .nav-icon{
    color:#fff;
}
    .nav a{
    display:flex;
    align-items:center;
    gap:8px;
}

.nav-icon{
    width:19.2px;
    height:19.2px;
    min-width:19.2px;
    min-height:19.2px;
    fill:currentColor;
    flex-shrink:0;
    display:block;
    overflow:visible;
    transition:.25s;
}
    .topbar{
      height:64px;
      padding:0 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      background:rgba(255,255,255,.05);
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .topbar h2{
      margin:0;
      font-size:20px;
    }

    .back-link{
      color:#fff;
      text-decoration:none;
      padding:8px 12px;
      border-radius:8px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.1);
    }

    .container{
      width:100%;
      padding:20px;
      box-sizing:border-box;
    }

    .card{
      max-width:900px;
      margin:0 auto;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      padding:18px;
      box-shadow:0 12px 30px rgba(0,0,0,.25);
    }

    h3{
      margin:0 0 18px;
      color:#38bdf8;
    }


    input,
    select,
    textarea{
      width:100%;
      box-sizing:border-box;
      margin-bottom:14px;
      padding:8px 11px;
      border-radius:6px;
      border:1px solid rgba(255,255,255,.15);
      background:rgba(0,0,0,.25);
      color:#fff;
      outline:none;
    }

    input,
    select{
      height:36px;
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    input:focus,
    select:focus,
    textarea:focus{
      border-color:#38bdf8;
      box-shadow:0 0 0 2px rgba(56,189,248,.18);
    }

    .item-box{
      border:1px dashed rgba(255,255,255,.22);
      border-radius:12px;
      padding:14px;
      margin-bottom:14px;
      background:rgba(0,0,0,.12);
    }

    .item-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:12px;
    }

    .item-title{
      font-weight:700;
      color:#38bdf8;
    }

    .preview{
      margin:0 0 12px;
      width:180px;
      max-width:100%;
      border-radius:10px;
      display:block;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .btn{
      border:0;
      border-radius:7px;
      padding:9px 14px;
      color:#fff;
      cursor:pointer;
      font-weight:600;
      text-decoration:none;
    }

    .btn-primary{
      background:#1668dc;
      flex:1;
      min-width:180px;
    }

    .btn-add{
      background:#1554ad;
    }

    .btn-remove{
      background:#b91c1c;
      padding:6px 10px;
      font-size:12px;
    }

    .btn-cancel{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
    }

    @media(max-width:768px){
      .container{
        padding:12px;
      }

      .card{
        padding:14px;
      }

      .topbar h2{
        font-size:17px;
      }
    }
  .time-row{
  display:flex;
  gap:8px;
  align-items:flex-start;
  margin-bottom:10px;
}

.time-row input{
  flex:1;
  margin-bottom:0;
}

.time-row .remove-time{
  flex-shrink:0;
  height:36px;
}
    .login-loading{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.20);
  z-index:999999;
}

.login-loading.show{
  display:flex;
}

.loading-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:5px;
  pointer-events:none;
}

.loading-dots{
  width:32px;
  height:32px;
  position:relative;
  animation:loadingRotate 1s linear infinite;
}

.loading-dots span{
  position:absolute;
  width:10px;
  height:10px;
  border-radius:50%;
  background:rgba(255,255,255,.85);
  opacity:.25;
  animation:dotPulse 1s linear infinite;
}

.loading-dots span:nth-child(1){ top:0; left:50%; transform:translateX(-50%); }
.loading-dots span:nth-child(2){ right:0; top:50%; transform:translateY(-50%); animation-delay:.25s; }
.loading-dots span:nth-child(3){ bottom:0; left:50%; transform:translateX(-50%); animation-delay:.5s; }
.loading-dots span:nth-child(4){ left:0; top:50%; transform:translateY(-50%); animation-delay:.75s; }

.loading-text{
  color:#fff;
  font-size:14px;
  text-align:center;
}

@keyframes dotPulse{
  0%{ opacity:.2; }
  25%{ opacity:1; }
  50%{ opacity:.4; }
  100%{ opacity:.2; }
}

@keyframes loadingRotate{
  from{ transform:rotate(0deg); }
  to{ transform:rotate(360deg); }
}
  </style>
</head>

<body>
  
<div id="pageLoading" class="login-loading show">
  <div class="loading-box">
    <div class="loading-dots">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>

    <div class="loading-text">
      Please wait while fetching...
    </div>
  </div>
</div>
  
<div class="topbar">
  <h2>✏️ Edit Blast Vault</h2>

  <a class="back-link" href="/admin/blast">
    ← Back
  </a>
</div>

<div class="container">
  <div class="card">

    <h3>Edit Vault</h3>

    <form
      method="POST"
      action="/admin/blast/edit/{{ vault[0] }}"
      id="editBlastForm">

      <label>Vault Name</label>
      <input
        type="text"
        name="name"
        value="{{ vault[1] }}"
        required>

      <label>Mode</label>
      <select name="mode" id="mode">
        <option
          value="random"
          {% if vault[2] == "random" %}selected{% endif %}>
          Random Auto Blast
        </option>

        <option
          value="fixed"
          {% if vault[2] == "fixed" %}selected{% endif %}>
          Fixed Auto Blast
        </option>
      </select>

<label>Daily Send Times</label>

<div id="timesWrap">

  {% for schedule in blast_times %}
  <div class="time-row">
    <input
      type="time"
      name="send_time[]"
      value="{{ schedule[1] }}"
      required>

    <button
      type="button"
      class="btn btn-remove remove-time"
      {% if blast_times|length <= 1 %}style="display:none;"{% endif %}>
      Remove
    </button>
  </div>

  {% else %}
  <div class="time-row">
    <input
      type="time"
      name="send_time[]"
      value="{{ vault[3] }}"
      required>

    <button
      type="button"
      class="btn btn-remove remove-time"
      style="display:none;">
      Remove
    </button>
  </div>
  {% endfor %}

</div>

<button
  type="button"
  class="btn btn-add"
  id="addTimeBtn">
  + Add Send Time
</button>

<br><br>

      <div id="itemsWrap">

        {% for item in items %}
        <div class="item-box">

          <div class="item-head">
            <div class="item-title">
              Banner / Caption {{ loop.index }}
            </div>

            {% if not loop.first %}
            <button
              type="button"
              class="btn btn-remove remove-item">
              Remove
            </button>
            {% endif %}
          </div>

          {% if item[1] %}
          <img
            class="preview"
            src="{{ item[1] }}"
            alt="Banner Preview">
          {% endif %}

          <label>Banner Image URL</label>
          <input
            type="text"
            name="image_url[]"
            value="{{ item[1] or '' }}"
            placeholder="https://res.cloudinary.com/...">

          <label>Caption</label>
          <textarea
            name="caption[]"
            required>{{ item[2] }}</textarea>

        </div>
        {% endfor %}

      </div>

      <div class="actions">
        <button
          type="button"
          class="btn btn-add"
          id="addItemBtn">
          + Add Banner/Caption
        </button>

        <a
          href="/admin/blast"
          class="btn btn-cancel">
          Cancel
        </a>

        <button
          type="submit"
          class="btn btn-primary">
          💾 Save Changes
        </button>
      </div>

    </form>

  </div>
</div>

<script>
const currentPath = window.location.pathname;

document.querySelectorAll(".nav a").forEach(link => {
  const href = link.getAttribute("href");

  link.classList.remove("active");

  if (href === currentPath) {
    link.classList.add("active");
  }
});

const loading = document.getElementById("pageLoading");

function showLoading(){
  if (loading) loading.classList.add("show");
}

function hideLoading(){
  if (loading) loading.classList.remove("show");
}

window.addEventListener("load", () => {
  setTimeout(hideLoading, 300);
});

window.addEventListener("pageshow", () => {
  setTimeout(hideLoading, 300);
});

window.addEventListener("beforeunload", () => {
  showLoading();
});

document.querySelectorAll("a").forEach(a => {
  a.addEventListener("click", function () {
    const href = this.getAttribute("href");

    if (
      !href ||
      href.startsWith("#") ||
      href.startsWith("javascript:") ||
      this.target === "_blank"
    ) {
      return;
    }

    showLoading();
  });
});

document.querySelectorAll("form").forEach(form => {
  form.addEventListener("submit", () => {
    showLoading();
  });
});
const modeSelect = document.getElementById("mode");
const itemsWrap = document.getElementById("itemsWrap");
const addItemBtn = document.getElementById("addItemBtn");
const timesWrap = document.getElementById("timesWrap");
const addTimeBtn = document.getElementById("addTimeBtn");

function updateTimeRemoveButtons(){
  const rows = timesWrap.querySelectorAll(".time-row");

  rows.forEach(row => {
    const btn = row.querySelector(".remove-time");

    btn.style.display =
      rows.length > 1 ? "inline-block" : "none";
  });
}

function bindTimeRemoveButtons(){
  timesWrap.querySelectorAll(".remove-time").forEach(btn => {
    btn.onclick = function(){
      const rows = timesWrap.querySelectorAll(".time-row");

      if(rows.length <= 1){
        return;
      }

      this.closest(".time-row").remove();
      updateTimeRemoveButtons();
    };
  });
}

addTimeBtn.addEventListener("click", function(){
  const row = document.createElement("div");
  row.className = "time-row";

  row.innerHTML = `
    <input
      type="time"
      name="send_time[]"
      required>

    <button
      type="button"
      class="btn btn-remove remove-time">
      Remove
    </button>
  `;

  timesWrap.appendChild(row);

  bindTimeRemoveButtons();
  updateTimeRemoveButtons();
});

function bindRemoveButtons(){
  document.querySelectorAll(".remove-item").forEach(btn => {
    btn.onclick = function(){
      const boxes = document.querySelectorAll(".item-box");

      if(boxes.length <= 1){
        return;
      }

      this.closest(".item-box").remove();
    };
  });
}

function updateModeState(){
  if(modeSelect.value === "fixed"){
    addItemBtn.style.display = "none";

    const boxes = itemsWrap.querySelectorAll(".item-box");

    boxes.forEach((box, index) => {
      if(index > 0){
        box.remove();
      }
    });
  }else{
    addItemBtn.style.display = "inline-block";
  }
}

addItemBtn.addEventListener("click", function(){
  const div = document.createElement("div");
  div.className = "item-box";

  div.innerHTML = `
    <div class="item-head">
      <div class="item-title">New Banner / Caption</div>

      <button
        type="button"
        class="btn btn-remove remove-item">
        Remove
      </button>
    </div>

    <label>Banner Image URL</label>
    <input
      type="text"
      name="image_url[]"
      placeholder="https://res.cloudinary.com/...">

    <label>Caption</label>
    <textarea
      name="caption[]"
      placeholder="Write caption..."
      required></textarea>
  `;

  itemsWrap.appendChild(div);
  bindRemoveButtons();
});

modeSelect.addEventListener("change", updateModeState);
bindTimeRemoveButtons();
updateTimeRemoveButtons();
bindRemoveButtons();
updateModeState();
</script>

</body>
</html>
